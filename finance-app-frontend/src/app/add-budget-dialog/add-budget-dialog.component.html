<div class="dialog-container">
  <h2 class="dialog-title">Add New Budget</h2>

  <!-- Scrollable Content -->
  <div class="scrollable-content">
    <form class="income-form">
      <h2>Your Total Income: ₹{{ totalIncome }}</h2>

      <!-- Input for Total Budget -->
      <mat-form-field appearance="outline" class="form-field">
        <mat-label>Total Budget</mat-label>
        <span matPrefix class="currency-prefix">₹</span>
        <input
          matInput
          type="number"
          [(ngModel)]="budgetSource.moneyLimit"
          (input)="onBudgetChange()"
          name="targetAmount"
          placeholder="0.00"
        />
      </mat-form-field>

      <!-- Dynamic Category List -->
      <div *ngFor="let category of budgetSource.categories" class="category-row">
        <p>{{ category.category }}</p>
        <p>Percentage: {{ category.percentage }}%</p>
        <p>Amount: ₹{{ category.moneyLimit.toFixed(2) }}</p>
      </div>
    </form>
  </div>

  <!-- Action Buttons -->
  <div class="dialog-actions">
    <button mat-stroked-button (click)="onCancel()">Cancel</button>
    <button mat-raised-button color="primary" (click)="onSave()">Save Budget</button>
  </div>
</div>
