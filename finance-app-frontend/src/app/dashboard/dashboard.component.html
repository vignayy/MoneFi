<div class="dashboard-container">
    <!-- Sidebar -->
    <nav class="sidebar">
      <div class="logo">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M2 17L12 22L22 17" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M2 12L12 17L22 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span>MoneyFi</span>
      </div>
      
      <div class="nav-links">
        <button routerLink="overview">
          <i class="fas fa-home"></i>
          <span>Overview</span>
        </button>
  
        <button routerLink="income">
          <i class="fas fa-money-bill-wave"></i>
          <span>Income</span>
        </button>
  
        <button routerLink="expenses">
          <i class="fas fa-receipt"></i>
          <span>Expenses</span>
        </button>
  
        <button routerLink="budgets">
          <i class="fas fa-wallet"></i>
          <span>Budgets</span>
        </button>
  
        <button routerLink="goals">
          <i class="fas fa-bullseye"></i>
          <span>Goals</span>
        </button>
  
        <button routerLink="spending">
          <i class="fas fa-chart-line"></i>
          <span>Spending Analysis</span>
        </button>
      </div>
  
      <div class="user-section">
        <button routerLink="profile">
          <i class="fas fa-user-circle"></i>
          <span>Profile</span>
        </button>
        <button class="logout-btn" (click)="logoutUser()">
          <i class="fas fa-sign-out-alt"></i>
          <span>Logout</span>
        </button>
      </div>
    </nav>
    <main class="main-content">
      <div class="content-container">
        <router-outlet></router-outlet>
      </div>
    </main>
  
  </div>
