<div class="logout-dialog-container" [@dialogAnimation]>
  <div class="logout-header">
    <mat-icon class="logout-icon">logout</mat-icon>
    <h2 mat-dialog-title>Confirm Logout</h2>
  </div>

  <mat-dialog-content>
    <p>Are you sure you want to logout?</p>
    <p class="warning-text">
      <mat-icon class="warning-icon">warning</mat-icon>
      Any unsaved changes will be lost.
    </p>
  </mat-dialog-content>

  <mat-dialog-actions>
    <button mat-button class="cancel-btn" (click)="onCancel()">
      <mat-icon>close</mat-icon>
      Stay Logged In
    </button>
    <button mat-button class="confirm-btn" (click)="onConfirm()">
      <mat-icon>exit_to_app</mat-icon>
      Logout
    </button>
  </mat-dialog-actions>
</div>
