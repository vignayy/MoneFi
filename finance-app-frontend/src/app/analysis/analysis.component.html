<div class="analysis-container">
    <!-- Header Section -->
    <header class="header-section">
      <h1>Financial Analytics</h1>
      <p class="subtitle">Track your spending patterns and financial progress with detailed insights</p>
    </header>
  
    <!-- Analytics Overview Section -->
    <section class="analytics-overview">
      <div class="analytics-content">
        <!-- Chart Grid -->
        <div class="chart-grid">
          <!-- Mixed Chart -->
          <div class="chart-card">
            <div class="chart-header">
              <h2>Expense vs Savings Trend</h2>
              <p>Track your monthly expenses and savings patterns</p>
            </div>
            <div class="chart-container">
              <canvas baseChart 
                      [data]="mixedChartData" 
                      [options]="mixedChartOptions" 
                      [type]="'bar'">
              </canvas>
            </div>
          </div>
  
          <!-- Radar Chart -->
          <div class="chart-card">
            <div class="chart-header">
              <h2>Financial Health Radar</h2>
              <p>Compare your current status with target goals</p>
            </div>
            <div class="chart-container">
              <canvas baseChart 
                      [data]="radarChartData" 
                      [options]="radarChartOptions" 
                      [type]="'radar'">
              </canvas>
            </div>
          </div>
        </div>
      </div>
    </section>
  </div>
